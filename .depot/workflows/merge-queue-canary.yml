name: Merge Queue Canary

on:
  pull_request:
  merge_group:

jobs:
  canary:
    name: canary
    runs-on: depot-ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Print context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"

      - name: Assert merge queue context
        if: github.event_name == 'merge_group'
        run: |
          case "${{ github.ref }}" in
            refs/heads/gh-readonly-queue/*)
              echo "PASS: merge_group ref is a queue ref"
              ;;
            *)
              echo "FAIL: expected refs/heads/gh-readonly-queue/*"
              exit 1
              ;;
          esac
          echo "CANARY_RESULT: PASS"
